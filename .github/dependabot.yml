version: 2
updates:
  # Python dependencies — uv reads pyproject.toml and uv.lock (GA since 2025-03).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"

  # GitHub Actions — keeps the SHA-pinned actions current; Dependabot bumps the
  # commit SHA and the trailing version comment together.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
