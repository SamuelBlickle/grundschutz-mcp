name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # weekly drift monitor against the pinned BSI source

# Least privilege: jobs only read the repo; no write scopes on GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - name: Sync
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Type check
        run: uv run pyright
      - name: Unit tests (offline)
        run: uv run pytest -m "not network"

  secrets:
    # Credential scanner (complements the local leak-gate, which does not travel
    # with clones). Scans the full history; fails the build on any finding.
    # Intentionally has no `if:` guard — it must run on every push and PR.
    runs-on: ubuntu-latest
    permissions:
      contents: read  # explicit job scope, independent of the top-level default
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  drift-monitor:
    # Runs on schedule and main. Hits the pinned BSI source and fails loudly if
    # the OSCAL shape no longer maps. Surfaces upstream drift before users do.
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - name: Sync
        run: uv sync --extra dev
      - name: Schema test against pinned BSI data
        run: uv run pytest -m network
