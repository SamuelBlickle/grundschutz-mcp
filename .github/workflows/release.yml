name: Release

# Tag-triggered. Building is decoupled from publishing so the only job holding
# OIDC `id-token: write` is the minimal publish step.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # keyless build-provenance attestation (OIDC)
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Verify tag matches package version
        run: |
          ver=$(grep -oE '__version__ = "[^"]+"' src/grundschutz_mcp/__init__.py | grep -oE '[0-9][^"]*')
          test "v$ver" = "$GITHUB_REF_NAME" || { echo "tag $GITHUB_REF_NAME != version v$ver"; exit 1; }
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - name: Build sdist + wheel
        run: uv build
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: "dist/*"
      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    # Never publish from a fork: the OIDC subject must be this repository.
    if: github.repository == 'SamuelBlickle/grundschutz-mcp'
    runs-on: ubuntu-latest
    # Configure this environment on GitHub and as the PyPI trusted publisher
    # (see RELEASING.md). Add required-reviewer protection here for a manual gate.
    environment:
      name: pypi
      url: https://pypi.org/p/grundschutz-mcp
    permissions:
      id-token: write       # OIDC for PyPI Trusted Publishing + Sigstore signing
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (Trusted Publishing, tokenless)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        # No password/token: uses OIDC Trusted Publishing and Sigstore-signs the
        # artifacts. Activation requires the PyPI trusted-publisher config below.
